name: reusable-sanity

on:
  workflow_call:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate baseline docs
        run: |
          test -f README.md
          test -f LICENSE
          test -f NOTICE
          test -f CREDITS.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
