name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install TPM2 system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libtss2-dev
      - name: Build resolver
        run: cargo build --release --bin openclaw-hwvault-resolver
      - name: Test resolver
        run: cargo test --bin openclaw-hwvault-resolver
